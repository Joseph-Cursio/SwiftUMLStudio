name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same workflow on the same ref so PR pushes
# don't pile up. Pushes to main always run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# `pipefail` so failures in `xcodebuild | xcbeautify` aren't masked by
# xcbeautify's exit status. `errexit` is on by default for GitHub steps
# but be explicit so the intent is obvious.
defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  bridge:
    name: SwiftUMLBridge (CLI + framework)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # The package's manifest declares swift-tools-version: 6.2, which
      # the default Xcode on macos-latest doesn't ship yet. Pick the
      # newest preinstalled Xcode on the runner image — `latest-stable`
      # tracks the highest GM Xcode available and at the time of writing
      # has Swift 6.2.
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: SwiftUMLBridge/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('SwiftUMLBridge/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        run: swift package --package-path SwiftUMLBridge resolve

      - name: Build
        run: swift build --package-path SwiftUMLBridge

      - name: Test
        run: swift test --package-path SwiftUMLBridge --enable-code-coverage

      - name: Smoke-test the CLI
        run: |
          swift run --package-path SwiftUMLBridge swiftumlbridge --version
          swift run --package-path SwiftUMLBridge swiftumlbridge --help

  studio:
    name: SwiftUMLStudio (macOS app)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -scheme SwiftUMLStudio \
            -destination 'generic/platform=macOS' \
            -skipPackagePluginValidation \
            build

      - name: Test
        run: |
          xcodebuild test \
            -scheme SwiftUMLStudio \
            -destination 'platform=macOS,arch=arm64' \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
